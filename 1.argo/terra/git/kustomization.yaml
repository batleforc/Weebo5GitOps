apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: terra-git
namespace: git

generatorOptions:
  disableNameSuffixHash: true

resources:
  - job.yaml
  - volume.yaml

configMapGenerator:
  - name: terra-git-config
    namespace: git
    files:
      - ./terra-map/main.tf
      - ./terra-map/action.tf
