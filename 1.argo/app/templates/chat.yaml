{{- if .Values.chat.enabled -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: '{{ .Values.repo }}'
    path: '1.argo/helm/chat'
    helm:
      releaseName: chat
      valuesObject:
        repo: "{{ .Values.repo }}"
        traefik:
          ips: "{{ .Values.traefik.ips }}"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: 'argocd'
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
{{- end -}}
