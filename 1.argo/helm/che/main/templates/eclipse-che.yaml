{{- if .Values.che.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "eclipse-che-operator"
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: "default"
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  source:
    chart: eclipse-che
    repoURL: https://eclipse-che.github.io/che-operator/charts
    targetRevision: "{{ .Values.che.operator.cheVersion }}"
    helm:
      releaseName: eclipse-che-operator
  destination:
    name: "in-cluster"
    namespace: "eclipse-che"
{{- end -}}
