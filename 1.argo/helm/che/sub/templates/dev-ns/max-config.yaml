apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: max-config
  namespace: argocd
spec:
  project: default
  source:
    path: config
    repoURL: "https://github.com/batleforc/weebo-dotfiles-che"
    targetRevision: HEAD
  destination:
    namespace: dev-ws-max
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
