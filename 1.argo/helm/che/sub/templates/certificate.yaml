apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: che-cluster-tls
  namespace: eclipse-che
spec:
  dnsNames:
    - "{{ .Values.che.ingress.host }}"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: outbound
  secretName: che-cluster-tls
  secretTemplate:
    labels:
      app.kubernetes.io/part-of: che.eclipse.org
