apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: che-cluster-tls
  namespace: eclipse-che
spec:
  commonName: "{{ .Values.che.ingress.host }}"
  dnsNames:
    - "{{ .Values.che.ingress.host }}"
  issuerRef:
    kind: ClusterIssuer
    name: "outbound"
  secretName: che-cluster-tls
  secretTemplate:
    labels:
      app.kubernetes.io/part-of: che.eclipse.org
