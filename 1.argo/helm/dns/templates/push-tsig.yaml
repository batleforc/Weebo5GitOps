{{- if .Values.pushTsig.enabled -}}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: "push-tsig-store"
  namespace: {{ .Release.Namespace }}
  annotations:
    ## Add this annotation to disable controller warning events for unmaintained stores
    external-secrets.io/disable-maintenance-checks: "true"
spec:
  provider:
    vault:
      server: "https://vault.vault:8200"
      path: "mv"
      caProvider:
        type: Secret
        name: vault-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "tsig-push"
          serviceAccountRef:
            name: "default"
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: pushsecret-tsig
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: push-tsig-store
      kind: SecretStore
  selector:
    secret:
      name: tsig-key-secret
  data:
    - match:
        secretKey: tsig.key.secret
        remoteRef:
          remoteKey: cert-manager/tsig
          property: tsig.key.secret
    - match:
        secretKey: tsig.key
        remoteRef:
          remoteKey: cert-manager/tsig
          property: tsig.key
    - match:
        secretKey: tsig.key.secret.base64
        remoteRef:
          remoteKey: cert-manager/tsig
          property: tsig.key.secret.base64
{{- end -}}
