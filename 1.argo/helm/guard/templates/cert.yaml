{{- if .Values.vaultwarden.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vaultwarden-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: vaultwarden-tls
  issuerRef:
    name: outbound
    kind: ClusterIssuer
  commonName: {{ .Values.vaultwarden.domain }}
  dnsNames:
    - {{ .Values.vaultwarden.domain }}
{{- end -}}
