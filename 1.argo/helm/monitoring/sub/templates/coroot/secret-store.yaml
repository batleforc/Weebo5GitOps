{{ if .Values.coroot.enabled }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: "coroot-store"
  namespace: "coroot"
  annotations:
    ## Add this annotation to disable controller warning events for unmaintained stores
    external-secrets.io/disable-maintenance-checks: "true"
spec:
  provider:
    vault:
      server: "https://vault.vault:8200"
      path: "mv"
      caProvider:
        type: Secret
        name: vault-tls
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "monitoring"
          serviceAccountRef:
            name: "default"
{{ end }}
