{{- if .Values.dns.certificate.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.dns.certificate.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: {{ .Values.dns.certificate.name }}
  commonName: {{ .Values.dns.domain }}
  dnsNames:
    - {{ .Values.dns.domain }}
  issuerRef:
    name: {{ .Values.dns.certificate.issuerRef }}
    kind: {{ .Values.dns.certificate.issuerRefKind }}
{{- end -}}
