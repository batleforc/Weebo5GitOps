{{- if .Values.vaultInstance.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-https
  labels:
    app: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    cert-manager.io/cluster-issuer: "outbound"
    traefik.ingress.kubernetes.io/router.middlewares: traefik-vpn-only@kubernetescrd
spec:
  rules:
    - host: {{ .Values.vaultInstance.dns }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
  tls:
    - hosts:
        - {{ .Values.vaultInstance.dns }}
      secretName: {{ .Values.vaultInstance.dns | replace "." "-" }}-tls
{{- end -}}
