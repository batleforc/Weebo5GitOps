{{- if .Values.rustfs.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs-https
  labels:
    app: rustfs
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "{{ .Values.rustfs.expose.issuerRef }}"
    traefik.ingress.kubernetes.io/router.middlewares: traefik-vpn-only@kubernetescrd
spec:
  rules:
    - host: {{ .Values.rustfs.domain.core }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs-svc
                port:
                  number: 9001
    {{- range .Values.rustfs.domain.additional }}
    - host: {{ .name }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs-svc
                port:
                  number: 9001
    {{- end }}
  tls:
    - hosts:
        - {{ .Values.rustfs.domain.core }}
      secretName: {{ .Values.rustfs.expose.certName }}
    {{- range .Values.rustfs.domain.additional }}
    - hosts:
        - {{ .name }}
      secretName: {{ .cert }}
    {{- end }}
{{- end -}}
