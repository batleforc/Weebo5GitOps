apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terra-registry
  namespace: argocd
spec:
  project: default
  source:
    path: 1.argo/terra/registry
    repoURL: "{{ .Values.repo }}"
    targetRevision: HEAD
  destination:
    namespace: {{ .Release.Namespace }}
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
