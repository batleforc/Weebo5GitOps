apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terra-vpn
  namespace: argocd
spec:
  project: default
  source:
    path: 1.argo/terra/vpn
    repoURL: "{{ .Values.repo }}"
    targetRevision: HEAD
  destination:
    namespace: vpn
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
