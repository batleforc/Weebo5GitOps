{{- if .Values.elementWeb.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: element
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: "outbound"
spec:
  tls:
    - hosts:
        - {{ .Values.elementWeb.domain }}
      secretName: element-tls
  rules:
    - host: {{ .Values.elementWeb.domain }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: element
                port:
                  number: 8080
{{- end -}}
