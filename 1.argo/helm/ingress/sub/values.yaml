        - 10.96.0.0/12
        - fd00:10:96::/112
        - 94.23.38.81/32
        - 2001:41d0:2:2751::1/128
        - 100.64.0.0/16
        - fd67:3c3d:53b7:8bb7::/64

authentik:
  enabled: false

repo: ""

