{{- if .Values.traefik.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
  source:
    chart: traefik
    repoURL: oci://ghcr.io/traefik/helm/traefik
    targetRevision: {{ .Values.traefik.version }}
    helm:
      releaseName: traefik
      valuesObject:
        metrics:
          addInternals: true
        deployment:
          podAnnotations:
            coroot.com/scrape-metrics: 'true'
            coroot.com/metrics-port: '9100'
        ingressRoute:
          dashboard:
            enabled: false
            matchRule: Host(`dashboard.batleforc.fr`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
            entryPoints:
            - websecure
        service:
          spec:
            type: LoadBalancer
            ipFamilyPolicy: PreferDualStack
            ipFamilies:
              - IPv4
              - IPv6
          annotations:
            lbipam.cilium.io/sharing-key: "weebo-gate"
            lbipam.cilium.io/ips: "{{ .Values.traefik.ips }}"
            lbipam.cilium.io/sharing-cross-namespace: "*"
        logs:
          general:
            format: json
          access:
            enabled: true
            format: json
            fields:
              headers:
                defaultMode: keep
                names:
                  Authorization: redact
        providers:
          kubernetesCRD:
            enabled: {{ .Values.traefik.kubeCRD.enabled }}
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: {{ .Values.traefik.kubeIngress.enabled }}
            allowEmptyServices: true
            allowExternalNameServices: true
            publishedService:
              enabled: true
          kubernetesGateway:
            enabled: {{ .Values.traefik.gatewayAPI.enabled }}
        #experimental:
          # {{- range $name, $plugin := .Values.traefik.plugins }}
          # plugins:
          #   {{ $name }}:
          #     moduleName: {{ $plugin.moduleName }}
          #     version: {{ $plugin.version }}
          # {{- end }}
  destination:
    name: "in-cluster"
    namespace: traefik
{{- end -}}
