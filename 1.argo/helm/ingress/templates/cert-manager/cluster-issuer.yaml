{{- if .Values.certManager.certIssuer.enabled -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.certIssuer.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  acme:
    email: {{ .Values.certManager.certIssuer.email }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: {{ .Values.certManager.certIssuer.name }}-private-key
    solvers:
    - http01:
        ingress:
          class: traefik
{{- end -}}
