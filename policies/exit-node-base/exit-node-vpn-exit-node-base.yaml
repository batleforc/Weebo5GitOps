apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  labels:
    app.kubernetes.io/managed-by: cpg
  name: cpg-exit-node-vpn-exit-node-base
  namespace: exit-node-base
spec:
  egress:
  # UDP/53 to io.kubernetes.pod.namespace=kube-system, k8s-app=kube-dns
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
  endpointSelector:
    matchLabels:
      app: exit-node-vpn-exit-node-base
status: {}
