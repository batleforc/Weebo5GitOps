version: "3"

vars:
  registry: "registry.batleforc.fr"

tasks:
  buildah:
    desc: "Build the Buildah container image for the Git action"
    cmds:
      - podman build -t {{ .registry }}/forgejo-action/forgejo-runner:latest
        .tmp/runner
      - podman push {{ .registry }}/forgejo-action/forgejo-runner:latest
