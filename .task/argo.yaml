version: "3"

tasks:
  default:
    desc: "Default task to access argoCD CLI"
    env:
      KUBECONFIG: 0.config/kubeconfig.yaml
    cmds:
      - argocd {{ .CLI_ARGS }}
  forward:
    desc: "Forward the port to access ArgoCD UI"
    env:
      KUBECONFIG: 0.config/kubeconfig.yaml
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8080:80
  pwd:
    desc: "Get the initial admin password for ArgoCD"
    env:
      KUBECONFIG: 0.config/kubeconfig.yaml
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d && echo
  login:
    desc: "Login to ArgoCD CLI"
    cmds:
      - argocd login localhost:8080 --username admin --password $(task argo:pwd) --insecure --grpc-web --plaintext
  login-remote:
    desc: "Login to ArgoCD CLI for remote cluster"
    env:
      KUBECONFIG: 0.config/kubeconfig.yaml
    cmds:
      - argocd login argo.batleforc.fr --sso
