blocky:
  enabled: true
  image:
    repository: "ghcr.io/0xerr0r/blocky"
    tag: "v0.23.0"
  service:
    type: ClusterIP
    ipFamily: DualStack
    annotations: {}
    port:
      - port: 53
        targetPort: 53
        protocol: UDP
      - port: 53
        targetPort: 53
        protocol: TCP
      - port: 4000
        targetPort: 4000
        protocol: TCP
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi
