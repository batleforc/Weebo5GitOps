{{- if and .Values.management.enabled .Values.management.serviceStun.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.fullname" . }}-management-stun
  namespace: {{ include "netbird.namespace" . }}
  labels:
    {{- include "netbird.management.labels" . | nindent 4 }}
  {{- with .Values.management.serviceStun.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.management.serviceStun.type }}
  ipFamilyPolicy: {{ .Values.management.serviceStun.ipFamilyPolicy }}
  ipFamilies:
    {{- range .Values.management.serviceStun.ipFamilies }}
    - {{ . }}
    {{- end }}
  ports:
    - port: {{ .Values.management.serviceStun.port }}
      targetPort: {{ .Values.management.stunContainerPort }}
      protocol: UDP
      name: {{ .Values.management.serviceStun.name }}
  selector:
    {{- include "netbird.management.selectorLabels" . | nindent 4 }}
  {{- with .Values.management.serviceStun.externalIPs }}
  externalIPs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
