{{- if .Values.managementTokenSecretJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netbird.managementTokenSecretJob.serviceAccountName" . }}
  namespace: {{ include "netbird.namespace" . }}
  labels:
    {{- include "netbird.managementTokenSecretJob.labels" . | nindent 4 }}
spec:
  template:
    spec:
      serviceAccountName: {{ include "netbird.managementTokenSecretJob.serviceAccountName" . }}
      containers:
        - name: token-create
          image: {{ .Values.managementTokenSecretJob.image.repository }}:{{ .Values.managementTokenSecretJob.image.tag }}
          imagePullPolicy: {{ .Values.managementTokenSecretJob.image.pullPolicy }}
          command: {{ toJson .Values.managementTokenSecretJob.command }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SECRET_NAME
              value: {{ .Values.managementTokenSecretJob.name }}
            - name: TOKEN_KEY
              value: {{ .Values.managementTokenSecretJob.tokenKey }}
      restartPolicy: Never
{{- end }}
