containers:
  - name: main
    image: registry.batleforc.fr/forgejo-action/mise:main
    imagePullPolicy: Always
    resources:
      requests:
        cpu: "500m"
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 10Gi
    volumeMounts:
      - name: vault-tls
        mountPath: /vault-tls
        readOnly: true
    env:
      - name: VAULT_ADDR
        value: "https://vault.vault:8200"
      - name: VAULT_CA_CERT
        value: /vault-tls/ca.crt
      - name: VAULT_FORGEJO_ROLE
        value: forgejo_default_policy
imagePullSecrets:
  - name: docker-config
volumes:
  - name: vault-tls
    secret:
      secretName: vault-tls
restartPolicy: Never
