{{- if .Values.runner.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: forgejo-runner
  apiGroup: rbac.authorization.k8s.io
  namespace: {{ .Release.Namespace }}
{{- end -}}
