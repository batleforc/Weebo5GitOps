runner:
  enabled: true
  image:
    repository: registry.batleforc.fr/forgejo-action/forgejo-runner
    tag: latest
  podSpecToInclude:
    - buildah.yaml
    - default.yaml
  runnerConfig:
    log:
      level: info

    runner:
      capacity: 4
      timeout: 3h
      labels:
        - "kubernetes:k8spod:///config/podspec-default.yaml"
        - "buildah:k8spod:///config/podspec-buildah.yaml"
      envs:
        VAULT_ADDR: "https://vault.vault:8200"
        VAULT_CA_CERT: /vault-tls/ca.crt
        VAULT_FORGEJO_ROLE: forgejo_default_policy

    kubernetes:
      namespace: forgejo-actions
      poll_timeout: 30s

    container:
      # Disables Docker socket check — not needed with K8s backend
      docker_host: "-"

    cache:
      enabled: false

    server:
      connections:
        forgejo:
          url: https://git.batleforc.fr
          uuid: "{{RUNNER_UUID}}" # filled in at deploy time
          token: "{{RUNNER_TOKEN}}" # filled in at deploy time
          labels:
            - "kubernetes:k8spod:///config/podspec-default.yaml"
            - "buildah:k8spod:///config/podspec-buildah.yaml"
  secretStore:
    enabled: true
