{{- if .Values.netbird.test -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "exit-node-{{ .Release.Name }}-test"
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "exit-node-{{ .Release.Name }}-test"
  template:
    metadata:
      labels:
        app: "exit-node-{{ .Release.Name }}-test"
      annotations:
{{- with .Values.netbird.annotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: netbird
          image: netbirdio/netbird:latest
          env:
            - name: NB_SETUP_KEY
              value: "{{ tpl .Values.netbird.setup_key . }}" # replace with your setup key
            - name: NETBIRD_PEER_NAME
              value: "{{ .Values.netbird.peer_name }}"
            - name: NB_LOG_LEVEL
              value: "info"
            - name: NETBIRD_URL
              value: "{{ .Values.netbird.url }}"
            - name: NB_MANAGEMENT_URL
              value: "{{ .Values.netbird.url }}"
            - name: NB_ADMIN_URL
              value: "{{ .Values.netbird.url }}"
            - name: TZ
              value: "{{ .Values.netbird.tz }}"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_RESOURCE
                - SYS_ADMIN
          livenessProbe:
            exec:
              command: ["netbird", "status", "--check", "live"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["netbird", "status", "--check", "ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["netbird", "status", "--check", "startup"]
            periodSeconds: 2
            timeoutSeconds: 10
            failureThreshold: 30
          resources:
{{- with .Values.netbird.resources }}
{{ toYaml . | indent 12 }}
{{- end }}
{{- end -}}
