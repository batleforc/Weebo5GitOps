{{- if .Values.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monofolio-http
  labels:
    app: monofolio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect-to-https@kubernetescrd
spec:
  rules:
    {{- range .Values.domain }}
    - host: {{ .name }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monofolio
                port:
                  number: 3000
    {{- end }}
{{- end -}}
