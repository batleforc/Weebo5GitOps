{{- if .Values.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monofolio-https
  labels:
    app: monofolio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "{{ .Values.ingress.certIssuer }}"
spec:
  rules:
    {{- range .Values.domain }}
    - host: {{ .name }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monofolio
                port:
                  number: 3000
    {{- end }}
  tls:
    {{- range .Values.domain }}
    - hosts:
        - {{ .name }}
      secretName: {{ .cert }}
    {{- end }}
{{- end -}}
