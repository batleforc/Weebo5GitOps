enabled: true

domain:
  - cert: maxleriche-cert
    name: maxleriche.net
  - cert: batleforc-cert
    name: batleforc.fr
  - cert: weebo-cert
    name: weebo.fr

image:
  repository: registry.batleforc.fr/batleforc/monofolio-rs
  tag: main
  pullPolicy: Always

secretStore:
  enabled: true

env:
  TRACKING_SCRIPT_SRC: "https://track.batleforc.fr/api/script.js"
  TRACKING_SITE_ID: "2080a0eb6b62"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "https://coroot.batleforc.fr/v1/traces"
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "https://coroot.batleforc.fr/v1/logs"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_SERVICE_NAME: "monofolio"
  OTEL_EXPORTER_OTLP_HEADERS: "x-api-key=${vault:mv/data/monofolio/monitoring#api-key}"
  OTEL_METRICS_EXPORTER: "none"

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 128Mi

ingress:
  certIssuer: outbound
